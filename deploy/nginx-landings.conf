# /etc/nginx/sites-available/tapsur-landings
# Dominios custom de landings (.lat) → Next (puerto 4010).
# Archivo SEPARADO del de tapsur.com a propósito: así agregar/quitar dominios de
# landing nunca toca el bloque SSL de tapsur.com (que maneja certbot).
#
# IMPORTANTE — bloque 443: hay otra app (cuervito) con un `listen 443` que, por ser
# el primero, es el server por defecto de HTTPS. Sin un bloque 443 para los `.lat`,
# cualquier request que llegue al origen por 443 (Cloudflare en modo "Full") cae a
# cuervito. Por eso definimos también un bloque 443 acá. Reusa el cert de tapsur.com:
# con Cloudflare "Full" (no "Full strict") no se valida el cert del origen, así que
# el mismatch de hostname no importa. Para "Full strict" usá un Origin Certificate.
#
# Activar:
#   sudo cp deploy/nginx-landings.conf /etc/nginx/sites-available/tapsur-landings
#   sudo ln -sf /etc/nginx/sites-available/tapsur-landings /etc/nginx/sites-enabled/tapsur-landings
#   sudo nginx -t && sudo systemctl reload nginx
#
# Para sumar un dominio nuevo: agregalo a AMBOS server_name (80 y 443) y recargá.

# ── HTTP (Cloudflare "Flexible" llega acá) ──
server {
    listen 80;
    listen [::]:80;

    server_name empfohlen.lat www.empfohlen.lat
                freecash.lat  www.freecash.lat
                playful.lat   www.playful.lat
                teststar.lat  www.teststar.lat;

    client_max_body_size 12M;

    location / {
        proxy_pass http://127.0.0.1:4010;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 75s;
    }
}

# ── HTTPS (Cloudflare "Full" llega acá; evita la caída a cuervito en 443) ──
server {
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name empfohlen.lat www.empfohlen.lat
                freecash.lat  www.freecash.lat
                playful.lat   www.playful.lat
                teststar.lat  www.teststar.lat;

    # Reusa el cert de tapsur.com (Cloudflare "Full" no valida el cert del origen).
    ssl_certificate     /etc/letsencrypt/live/tapsur.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tapsur.com/privkey.pem;

    client_max_body_size 12M;

    location / {
        proxy_pass http://127.0.0.1:4010;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 75s;
    }
}
