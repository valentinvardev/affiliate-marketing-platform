# /etc/nginx/sites-available/tapsur-landings
# Dominios custom de landings (.lat) → Next (puerto 4010).
# Archivo SEPARADO del de tapsur.com a propósito: así agregar/quitar dominios de
# landing nunca toca el bloque SSL de tapsur.com (que maneja certbot).
#
# Estos dominios están detrás de Cloudflare (proxied): el SSL del visitante lo
# maneja Cloudflare. Con SSL mode "Flexible" alcanza este bloque en :80.
# La app resuelve por el header Host qué campaña mostrar (panel → Admin → Dominios).
#
# Activar:
#   sudo cp deploy/nginx-landings.conf /etc/nginx/sites-available/tapsur-landings
#   sudo ln -sf /etc/nginx/sites-available/tapsur-landings /etc/nginx/sites-enabled/tapsur-landings
#   sudo nginx -t && sudo systemctl reload nginx
#
# Para sumar un dominio nuevo: agregalo al server_name de abajo y recargá nginx.

server {
    listen 80;
    listen [::]:80;

    server_name empfohlen.lat www.empfohlen.lat
                freecash.lat  www.freecash.lat
                playful.lat   www.playful.lat
                teststar.lat  www.teststar.lat;

    client_max_body_size 12M;

    location / {
        proxy_pass http://127.0.0.1:4010;            # directo al proceso de tapsur
        proxy_http_version 1.1;
        proxy_set_header Host $host;                 # ← clave: la app enruta por Host
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 75s;
    }
}
