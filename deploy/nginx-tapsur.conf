# /etc/nginx/sites-available/tapsur
# Reverse proxy: TODOS los dominios de tapsur → Next (puerto 4010).
# OJO: tapsur corre en el 4010 a propósito, para NO pisar otras apps (3000, 3010, etc.).
# El middleware de la app decide por el header Host si es el panel o una landing.
# Por eso lo único crítico acá es `proxy_set_header Host $host;`.
#
# Activar:
#   sudo ln -s /etc/nginx/sites-available/tapsur /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL (después de tener el http funcionando):
#   Panel + wildcard:  sudo certbot --nginx -d app.tapsur.com -d tapsur.com    (wildcard *.tapsur.com requiere DNS-01)
#   Dominio custom:    sudo certbot --nginx -d playgames.com -d www.playgames.com

upstream tapsur_app {
    server 127.0.0.1:4010;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;

    # Panel (raíz) + subdominios wildcard (landings) + dominios custom.
    # Agregá acá los dominios custom que conectes (o usá un server block aparte).
    server_name tapsur.com www.tapsur.com *.tapsur.com;

    # tamaño de upload (logos, imágenes de apps)
    client_max_body_size 12M;

    location / {
        proxy_pass http://tapsur_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;                 # ← clave: la app enruta por Host
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 75s;
    }
}

# ── Dominios custom de landings ──
# Todos los dominios .lat van al mismo proceso (4010); la app resuelve por Host
# qué campaña mostrar (mapeo en el panel admin → Dominios). Para sumar un dominio
# nuevo: agregalo al server_name de acá, recargá nginx y corré certbot por ese dominio.
server {
    listen 80;
    listen [::]:80;
    server_name empfohlen.lat www.empfohlen.lat
                freecash.lat  www.freecash.lat
                dealdrop.lat  www.dealdrop.lat
                teststar.lat  www.teststar.lat;

    client_max_body_size 12M;

    location / {
        proxy_pass http://tapsur_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;                 # ← la app enruta por Host
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 75s;
    }
}
